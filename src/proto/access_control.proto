syntax = "proto3";

package access_control;

service AccessControlService {
    rpc ListEffectivePrivileges(ListEffectivePrivilegesRequest)
        returns (ListEffectivePrivilegesResponse);
}

message ListEffectivePrivilegesRequest {
    string account = 1;
    string realm = 2;
}

message ListEffectivePrivilegesResponse {
  map<string, string> privileges = 1;
}
